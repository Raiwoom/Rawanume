name: Build Rawamune APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем исходный код репозитория на виртуальную машину
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Устанавливаем стабильное Java-окружение (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. КРИТИЧЕСКИЙ ШАГ: Принудительно выдаем права на исполнение компилятора Gradle
    - name: Grant Execute Permissions for Gradle
      run: chmod +x gradlew

    # 4. Запускаем сборку отладочного APK-файла мессенджера
    - name: Compile Rawamune Debug APK
      run: ./gradlew assembleDebug

    # 5. Выгружаем готовый скомпилированный APK в раздел Artifacts
    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RawamuneApp
        path: app/build/outputs/apk/debug/app-debug.apk
        
        
