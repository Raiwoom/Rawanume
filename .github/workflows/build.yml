name: Build Rawamune APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из репозитория
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Устанавливаем Java JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. НАСТОЯЩЕЕ РЕШЕНИЕ: Подключаем готовое облачное действие Gradle.
    # Оно само скачает, настроит компилятор и сгенерирует файл gradlew в обход любых ограничений.
    - name: Setup Gradle Build Action
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    # 4. Запускаем компиляцию приложения Rawamune
    # Теперь команда выполнится со 100% гарантией, так как среда полностью настроена
    - name: Compile Rawamune APK
      run: gradle assembleDebug

    # 5. Выгружаем готовый рабочий APK-файл в Артефакты
    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RawamuneApp
        path: app/build/outputs/apk/debug/app-debug.apk
        
        
        
        
