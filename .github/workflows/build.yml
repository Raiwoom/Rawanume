name: Build Rawamune APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 1. Ставим Java JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 2. РЕШЕНИЕ ПРОБЛЕМЫ: Автоматически создаем и настраиваем компилятор Gradle в облаке
    - name: Automatically Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.2

    # 3. Выдаем права на запуск созданного компилятора
    - name: Grant Execute Permissions
      run: chmod +x gradlew

    # 4. Собираем APK-файл Rawamune
    - name: Compile Rawamune APK
      run: ./gradlew assembleDebug

    # 5. Выгружаем готовый файл в Артефакты
    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RawamuneApp
        path: app/build/outputs/apk/debug/app-debug.apk
        
        
        
